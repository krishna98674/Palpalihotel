services:
  mysql:
    image: mysql:8.0
    container_name: palpalihotel-mysql

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: palpalihotel

    ports:
      - "3308:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - hotel-network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: palpalihotel-app

    restart: unless-stopped

    ports:
      - "5000:5000"

    env_file:
      - .env

    depends_on:
      mysql:
        condition: service_healthy

    networks:
      - hotel-network

volumes:
  mysql_data:

networks:
  hotel-network:
